<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IRON PULSE - Workout Calendar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Montserrat:wght@600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .day-cell {
            aspect-ratio: 1 / 1;
        }
        .workout-done {
            background-color: #84cc16 !important;
            color: #0f172a !important;
            box-shadow: 0 0 15px rgba(132, 204, 22, 0.4);
            border-color: #acf847 !important;
        }
        .workout-missed {
            background-color: rgba(255, 180, 171, 0.12) !important;
            color: #ffb4ab !important;
            border-color: rgba(255, 180, 171, 0.4) !important;
        }
        .workout-future {
            color: #c1cab0 !important;
            border-color: #424936 !important;
            opacity: 0.55;
        }
        /* Custom scrollbar for a cleaner gym look */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1326;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3449;
            border-radius: 10px;
        }
    </style>
<!-- Tailwind Theme Config -->

                    "on-surface-variant": "#c1cab0",
                    "tertiary-fixed-dim": "#ffb2b7",
                    "secondary": "#7bd0ff",
                    "on-tertiary": "#67001b",
                    "surface-bright": "#31394d",
                    "primary-container": "#84cc16",
                    "background": "#0b1326",
                    "primary-fixed": "#acf847",
                    "on-primary": "#1f3700",
                    "surface-container-lowest": "#060e20",
                    "on-background": "#dae2fd",
                    "on-primary-fixed": "#102000",
                    "surface-container-highest": "#2d3449",
                    "outline": "#8b947d",
                    "primary-fixed-dim": "#91db2a",
                    "on-tertiary-fixed-variant": "#92002a",
                    "on-error": "#690005",
                    "secondary-container": "#00a6e0",
                    "tertiary-container": "#ff9da4",
                    "surface-tint": "#91db2a",
                    "tertiary": "#ffc6c8",
                    "inverse-surface": "#dae2fd",
                    "outline-variant": "#424936",
                    "inverse-primary": "#416900",
                    "surface-container-high": "#222a3d",
                    "on-surface": "#dae2fd",
                    "surface-container-low": "#131b2e",
                    "on-secondary": "#00354a",
                    "on-tertiary-fixed": "#40000d",
                    "primary": "#9ee939",
                    "surface-dim": "#0b1326",
                    "secondary-fixed": "#c4e7ff",
                    "inverse-on-surface": "#283044",
                    "on-secondary-fixed-variant": "#004c69",
                    "on-primary-container": "#315200",
                    "on-secondary-fixed": "#001e2c",
                    "error": "#ffb4ab",
                    "tertiary-fixed": "#ffdadb",
                    "on-tertiary-container": "#96002b",
                    "surface-variant": "#2d3449",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#304f00",
                    "secondary-fixed-dim": "#7bd0ff",
                    "surface": "#0b1326"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"

            "spacing": {

                    "xl": "32px",
                    "lg": "24px",
                    "container-padding": "20px",
                    "md": "16px",
                    "unit": "4px",
                    "touch-target": "48px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "display-lg": ["Montserrat"],
                    "stat-lg": ["Montserrat"],
                    "body-lg": ["Inter"],
                    "headline-lg-mobile": ["Montserrat"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Montserrat"],
                    "label-md": ["Inter"],
                    "headline-md": ["Montserrat"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "stat-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant flex justify-between items-center px-container-padding h-touch-target">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="fitness_center">fitness_center</span>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile font-black text-primary uppercase tracking-tighter">IRON PULSE</h1>
</div>
<a class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-200 p-2 rounded-full" data-icon="format_list_bulleted" href="index.html" title="Go to Tracker">format_list_bulleted</a>
</header>
<main class="pt-24 px-container-padding max-w-lg mx-auto">
<!-- Calendar Header -->
<div class="flex justify-between items-center mb-6">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface" id="current-month">September</h2>
<p class="text-label-md font-label-md text-on-surface-variant" id="current-year">2023</p>
</div>
<div class="flex gap-2">
<button class="p-2 bg-surface-container hover:bg-surface-container-highest rounded-full transition-colors active:scale-90" id="prev-month">
<span class="material-symbols-outlined text-primary">chevron_left</span>
</button>
<button class="p-2 bg-surface-container hover:bg-surface-container-highest rounded-full transition-colors active:scale-90" id="next-month">
<span class="material-symbols-outlined text-primary">chevron_right</span>
</button>
</div>
</div>
<!-- Legend / Stats -->
<div class="grid grid-cols-2 gap-4 mb-4">
<div class="bg-surface-container rounded-xl p-4 border-l-4 border-primary shadow-lg">
<p class="text-label-md font-label-md text-on-surface-variant uppercase">Current Streak</p>
<div class="flex items-baseline gap-2">
<span class="font-stat-lg text-stat-lg text-primary" id="streak-count">0</span>
<span class="text-body-md text-on-surface-variant">Days</span>
</div>
</div>
<div class="bg-surface-container rounded-xl p-4 border-l-4 border-secondary shadow-lg">
<p class="text-label-md font-label-md text-on-surface-variant uppercase">This Month</p>
<div class="flex items-baseline gap-2">
<span class="font-stat-lg text-stat-lg text-secondary" id="month-total">0</span>
<span class="text-body-md text-on-surface-variant">Sessions</span>
</div>
</div>
</div>
<!-- Color Legend -->
<div class="flex items-center gap-4 mb-8 px-1 text-[11px] text-on-surface-variant">
<div class="flex items-center gap-1.5">
<span class="w-3 h-3 rounded-sm" style="background-color:#84cc16;"></span> Workout logged
</div>
<div class="flex items-center gap-1.5">
<span class="w-3 h-3 rounded-sm" style="background-color:rgba(255,180,171,0.5);"></span> Missed
</div>
<div class="flex items-center gap-1.5">
<span class="w-3 h-3 rounded-sm border border-outline-variant"></span> Upcoming
</div>
</div>
<!-- Monthly Grid -->
<div class="bg-surface-container-low rounded-2xl p-4 border border-outline-variant shadow-xl">
<div class="calendar-grid text-center mb-4 text-on-surface-variant font-label-md uppercase tracking-widest text-[10px]">
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
<div>Sun</div>
</div>
<div class="calendar-grid gap-2" id="calendar-body">
<!-- Days injected by JS -->
</div>
</div>
<!-- Selected Day Detail -->
<div class="hidden mt-6 bg-surface-container-low rounded-xl p-4 border border-outline-variant" id="day-detail">
<p class="font-label-md text-label-md text-primary uppercase mb-2" id="day-detail-title">Jun 20</p>
<div class="space-y-2" id="day-detail-list"></div>
</div>
<!-- Quick Quote / Motivation -->
<div class="mt-10 p-6 bg-surface-container-highest/30 rounded-xl border border-dashed border-outline-variant italic text-on-surface-variant text-center">
            "The only bad workout is the one that didn't happen."
        </div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface-container border-t border-outline-variant shadow-lg rounded-t-xl flex justify-around items-center h-20 pb-2">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed-dim active:scale-90 transition-transform" href="index.html">
<span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
<span class="font-label-md text-label-md">Tracker</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold transition-all duration-300 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="calendar_month" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<span class="font-label-md text-label-md">Calendar</span>
</a>
</nav>
<script>
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let selectedDateKey = null;

        // Shares the SAME storage key as the Tracker page (index.html) - no separate data, no syncing needed.
        const STORAGE_KEY = 'ironPulseData';

        function todayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // Reads every exercise across every week, and groups them by the date they were logged on.
        // Returns: { "2026-06-20": [ {name, group, sets, reps, weight, week...}, ... ], ... }
        function getExercisesByDate() {
            const raw = localStorage.getItem(STORAGE_KEY);
            const appData = raw ? JSON.parse(raw) : { exercises: [] };
            const byDate = {};

            // New flat structure: appData.exercises is one list, each item carries its own date.
            // (Old "weeks" structure is auto-migrated by the Tracker page on load, so by the time
            // the Calendar reads this, it should already be flat - this is just a safe fallback.)
            const allExercises = appData.exercises || (appData.weeks || []).flatMap(w => w.exercises || []);

            allExercises.forEach(ex => {
                // Older entries created before the date field existed have no date -
                // they simply won't appear on the calendar, which is the correct fallback.
                if (!ex.date) return;
                if (!byDate[ex.date]) byDate[ex.date] = [];
                byDate[ex.date].push(ex);
            });

            return byDate;
        }

        function updateStats() {
            const byDate = getExercisesByDate();
            const allDateKeys = Object.keys(byDate);

            // Monthly total = number of distinct days logged this month (not number of exercises)
            const monthPrefix = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            const monthCount = allDateKeys.filter(k => k.startsWith(monthPrefix)).length;
            document.getElementById('month-total').textContent = monthCount;

            // Streak: consecutive logged days counting back from today (or yesterday, if today isn't logged yet)
            let streak = 0;
            let checkDate = new Date();
            checkDate.setHours(0, 0, 0, 0);

            const todayStr = todayKey();
            if (!byDate[todayStr]) {
                checkDate.setDate(checkDate.getDate() - 1);
            }

            const keyFor = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

            while (byDate[keyFor(checkDate)]) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }

            document.getElementById('streak-count').textContent = streak;
        }

        function renderCalendar() {
            const calendarBody = document.getElementById('calendar-body');
            const monthDisplay = document.getElementById('current-month');
            const yearDisplay = document.getElementById('current-year');
            const byDate = getExercisesByDate();
            const todayStr = todayKey();

            calendarBody.innerHTML = '';
            monthDisplay.textContent = monthNames[currentMonth];
            yearDisplay.textContent = currentYear;

            // Get first day of month and total days
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            // Adjust for Mon-Sun grid (0 is Sunday, so convert to 1=Mon, ..., 0=Sun)
            const startingDay = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Padding for empty start
            for (let i = 0; i < startingDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell';
                calendarBody.appendChild(empty);
            }

            // Actual days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayBtn = document.createElement('button');
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                dayBtn.className = 'day-cell flex items-center justify-center rounded-lg border border-outline-variant/30 text-body-md font-bold transition-all duration-300 active:scale-95 hover:bg-surface-container-highest';
                dayBtn.textContent = day;

                const hasWorkout = !!byDate[dateKey];
                const isFuture = dateKey > todayStr;

                if (hasWorkout) {
                    // Green: at least one exercise was logged on this real calendar day
                    dayBtn.classList.add('workout-done');
                } else if (isFuture) {
                    // Grey: hasn't happened yet, nothing to judge
                    dayBtn.classList.add('workout-future');
                } else {
                    // Red: day has passed with nothing logged
                    dayBtn.classList.add('workout-missed');
                }

                if (dateKey === selectedDateKey) {
                    dayBtn.classList.add('ring-2', 'ring-primary-fixed');
                }

                dayBtn.onclick = () => showDayDetail(dateKey, byDate[dateKey]);
                calendarBody.appendChild(dayBtn);
            }
        }

        function showDayDetail(dateKey, exercises) {
            selectedDateKey = dateKey;
            const panel = document.getElementById('day-detail');
            const title = document.getElementById('day-detail-title');
            const list = document.getElementById('day-detail-list');

            const [y, m, d] = dateKey.split('-').map(Number);
            const niceDate = new Date(y, m - 1, d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            title.textContent = niceDate;

            if (!exercises || exercises.length === 0) {
                list.innerHTML = `<p class="text-on-surface-variant text-sm">No exercises logged this day. Open the Tracker to add one.</p>`;
            } else {
                list.innerHTML = exercises.map(ex => {
                    const summary = ex.group === 'cardio'
                        ? `${ex.duration}min · ${ex.distance}km`
                        : `${ex.sets}x${ex.reps} @ ${ex.weight}kg`;
                    return `
                    <div class="flex justify-between items-center bg-surface-container-highest/40 rounded-lg px-3 py-2">
                        <span class="text-on-surface font-semibold text-sm">${ex.name}</span>
                        <span class="text-on-surface-variant text-xs">${summary}</span>
                    </div>
                `;
                }).join('');
            }

            panel.classList.remove('hidden');
            renderCalendar(); // re-render to show selection ring
        }

        document.getElementById('prev-month').onclick = () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
            updateStats();
        };

        document.getElementById('next-month').onclick = () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
            updateStats();
        };

        // Initial render
        renderCalendar();
        updateStats();

        // Atmospheric interaction: subtle shake on logo click
        const logo = document.querySelector('h1');
        logo.addEventListener('click', () => {
            logo.classList.add('animate-bounce');
            setTimeout(() => logo.classList.remove('animate-bounce'), 1000);
        });
    </script>
</body></html>
