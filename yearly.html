<body class="bg-background text-on-background font-body-md min-h-screen pb-32">

<a class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-200 p-2 rounded-full" data-icon="format_list_bulleted" href="index.html" title="Go to Tracker">format_list_bulleted</a>

<!-- Year Stats -->
<div class="grid grid-cols-2 gap-4 mb-6">
<div class="bg-surface-container rounded-xl p-4 border-l-4 border-primary shadow-lg">
<p class="text-label-md font-label-md text-on-surface-variant uppercase">Total Days</p>

<div class="flex items-center gap-1.5">

</div>
<div class="flex items-center gap-1.5">

<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label-md text-label-md">Yearly</span>
</a>

<script>
        const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const MONTH_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

        // Shares the SAME storage key as the Tracker page - no separate data, no syncing needed.
        const STORAGE_KEY = 'ironPulseData';

        let currentYear = new Date().getFullYear();

        function todayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // Reads every logged exercise (new flat structure, with fallback for the old weeks structure)
        // and returns a Set of date strings ("YYYY-MM-DD") that have at least one exercise.
        function getLoggedDateSet() {
            const raw = localStorage.getItem(STORAGE_KEY);
            const appData = raw ? JSON.parse(raw) : { exercises: [] };
            const allExercises = appData.exercises || (appData.weeks || []).flatMap(w => w.exercises || []);
            const set = new Set();
            allExercises.forEach(ex => { if (ex.date) set.add(ex.date); });
            return set;
        }

        // Builds one mini month-grid (7 columns, Mon-start) for a given year+month (0-indexed month)
        function buildMonthGrid(year, month, loggedDates, todayStr) {
            const firstDay = new Date(year, month, 1).getDay();
            const startingPad = firstDay === 0 ? 6 : firstDay - 1; // Mon-start padding
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let cells = '';
            for (let i = 0; i < startingPad; i++) {
                cells += `<div class="mini-cell heat-pad"></div>`;
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let cls = 'heat-future';
                if (loggedDates.has(dateKey)) {
                    cls = 'heat-done';
                } else if (dateKey < todayStr) {
                    cls = 'heat-missed';
                }
                cells += `<div class="mini-cell ${cls}" title="${dateKey}"></div>`;
            }
            return cells;
        }

        function renderYear() {
            document.getElementById('current-year-display').textContent = currentYear;

            const loggedDates = getLoggedDateSet();
            const todayStr = todayKey();
            const grid = document.getElementById('year-grid');

            let monthCounts = [];
            let html = '';

            for (let m = 0; m < 12; m++) {
                // Count logged days in this month (for stats only, not shown per-cell)
                const monthPrefix = `${currentYear}-${String(m + 1).padStart(2, '0')}`;
                const countThisMonth = [...loggedDates].filter(d => d.startsWith(monthPrefix)).length;
                monthCounts.push(countThisMonth);

                const cellsHtml = buildMonthGrid(currentYear, m, loggedDates, todayStr);
                html += `
                    <div class="bg-surface-container-low rounded-xl p-3 border border-outline-variant">
                        <p class="text-on-surface-variant text-[11px] font-bold uppercase tracking-wide mb-2">${MONTH_SHORT[m]}</p>
                        <div class="mini-grid">${cellsHtml}</div>
                    </div>
                `;
            }

            grid.innerHTML = html;

            // Stats
            const yearTotal = monthCounts.reduce((a, b) => a + b, 0);
            document.getElementById('year-total').textContent = yearTotal;

            const maxCount = Math.max(...monthCounts);
            const bestMonthIndex = monthCounts.indexOf(maxCount);
            document.getElementById('best-month').textContent = maxCount > 0 ? MONTH_SHORT[bestMonthIndex] : '—';
        }

        document.getElementById('prev-year').onclick = () => {
            currentYear--;
            renderYear();
        };

        document.getElementById('next-year').onclick = () => {
            currentYear++;
            renderYear();
        };

        // Initial render
        renderYear();
    </script>
</body></html>
